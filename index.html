<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5c3a">
<title>Koordinaten</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:      #f0ede6;
    --surface: #ffffff;
    --border:  #c8c0b0;
    --accent:  #1a5c3a;
    --accent2: #1a3a8c;
    --danger:  #b52020;
    --text:    #1a1610;
    --muted:   #6b6050;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 0 0 80px 0; overflow-x: hidden; }

  header { background: var(--accent); border-bottom: 2px solid #0d3d26; padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
  header p  { font-family: var(--mono); font-size: 0.65rem; color: rgba(255,255,255,0.65); margin-top: 2px; }

  main { padding: 20px; max-width: 600px; margin: 0 auto; }

  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-family: var(--mono); font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  /* Input with paste button */
  .input-row { display: flex; align-items: stretch; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--bg); transition: border-color 0.15s, box-shadow 0.15s; }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,92,58,0.12); }

  .input-row input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 0.82rem;
    padding: 10px 10px; min-width: 0;
    -webkit-appearance: none;
  }
  .input-row input::placeholder { color: var(--muted); opacity: 0.55; font-style: italic; }

  .paste-btn {
    background: var(--accent); border: none; color: #fff;
    font-family: var(--mono); font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.05em; padding: 0 11px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; user-select: none; flex-shrink: 0;
    display: flex; align-items: center; transition: background 0.12s;
  }
  .paste-btn:active { background: #0d3d26; }

  /* Prefix info bar */
  .prefix-bar {
    background: rgba(26,92,58,0.08); border: 1.5px solid rgba(26,92,58,0.2);
    border-radius: 7px; padding: 8px 12px;
    font-family: var(--mono); font-size: 0.72rem; color: var(--accent);
    margin-bottom: 14px; display: none;
  }
  .prefix-bar span { color: var(--muted); }

  /* Counter display */
  .counter-display {
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 7px;
    padding: 10px 12px; font-family: var(--mono); font-size: 0.82rem;
    color: var(--muted); display: flex; align-items: center; gap: 6px;
  }
  .counter-val { color: var(--accent); font-weight: 700; }

  /* BUTTONS */
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 8px; cursor: pointer; font-family: var(--sans); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.1s, opacity 0.15s; }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; font-size: 0.8rem; padding: 13px 20px; width: 100%; margin-top: 16px; box-shadow: 0 2px 6px rgba(26,92,58,0.25); }
  .btn-export  { background: var(--accent2); color: #fff; font-size: 0.75rem; padding: 11px 18px; flex: 1; }
  .btn-clear   { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); font-size: 0.75rem; padding: 11px 18px; }
  .btn-row     { display: flex; gap: 10px; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #fff; font-family: var(--mono); font-size: 0.75rem; font-weight: 600; padding: 10px 20px; border-radius: 20px; transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.72rem; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 2px solid var(--border); font-size: 0.6rem; background: #f8f6f2; }
  td { padding: 10px 10px; border-bottom: 1px solid #e8e2d8; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(26,92,58,0.04); }
  .del-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; -webkit-tap-highlight-color: transparent; }
  .del-btn:active { color: var(--danger); }

  .empty { text-align: center; padding: 32px 20px; color: var(--muted); font-family: var(--mono); font-size: 0.75rem; }
  .empty span { display: block; font-size: 2rem; margin-bottom: 8px; opacity: 0.35; }

  .count-badge { display: inline-block; background: rgba(26,92,58,0.12); color: var(--accent); border-radius: 20px; font-family: var(--mono); font-size: 0.65rem; font-weight: 600; padding: 2px 10px; margin-left: 8px; vertical-align: middle; }

  .csv-preview { background: #f8f6f2; border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); line-height: 1.7; overflow-x: auto; white-space: pre; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<header>
  <h1>&#9632; KOORDINATEN2CSV</h1>
  <p>Name · Easting · Northing → CSV</p>
</header>

<main>
  <div class="card">
    <div class="card-title">Neuer Punkt</div>

    <!-- Prefix info -->
    <div class="prefix-bar" id="prefixBar">
      <span>Präfix aktiv: </span><strong id="prefixDisplay"></strong>
      <span> → nächster Punkt: </span><strong id="nextNameDisplay"></strong>
    </div>

    <!-- Name / Prefix -->
    <div class="field" style="margin-bottom:12px">
      <label>Name / Präfix</label>
      <div class="input-row">
        <input id="iName" type="text" placeholder="z.B. P oder Punkt" autocomplete="off"
               oninput="onPrefixInput()">
        <button class="paste-btn" onclick="pasteInto('iName', onPrefixInput)">PASTE</button>
      </div>
    </div>

    <!-- Easting + Northing -->
    <div class="grid-2">
      <div class="field">
        <label>Easting</label>
        <div class="input-row">
          <input id="iEast" type="text" inputmode="decimal" placeholder="438295.232" autocomplete="off">
          <button class="paste-btn" onclick="pasteInto('iEast')">PASTE</button>
        </div>
      </div>
      <div class="field">
        <label>Northing</label>
        <div class="input-row">
          <input id="iNorth" type="text" inputmode="decimal" placeholder="297883.520" autocomplete="off">
          <button class="paste-btn" onclick="pasteInto('iNorth')">PASTE</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="addPoint()">+ Punkt hinzufügen</button>
  </div>

  <!-- LIST -->
  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
      <span class="card-title" style="margin-bottom:0">Punkte <span id="countBadge" class="count-badge">0</span></span>
      <div class="btn-row">
        <button class="btn btn-export" onclick="exportCsv()">&#8659; CSV</button>
        <button class="btn btn-clear" onclick="clearAll()">&#10005; Leeren</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Easting</th><th>Northing</th><th></th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty"><span>📍</span>Noch keine Punkte eingetragen.</div>
    </div>
    <div id="previewWrap" style="display:none">
      <div class="divider"></div>
      <div class="card-title">CSV-Vorschau</div>
      <div id="csvPreview" class="csv-preview"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const STORAGE_KEY = 'koordinaten_v3';
  let points  = [];
  let counter = 1;        // auto-increment per session
  let prefix  = '';       // current prefix
  let csvName = '';       // filename = first-ever prefix

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ points, counter, prefix, csvName }));
  }
  function load() {
    try {
      const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (d) { points = d.points||[]; counter = d.counter||1; prefix = d.prefix||''; csvName = d.csvName||''; }
    } catch {}
  }

  function fmt3(v) { return parseFloat(v).toFixed(3); }

  function buildCsv() {
    let lines = ['Name,Easting,Northing'];
    for (const p of points)
      lines.push(`${p.name},${fmt3(p.easting)},${fmt3(p.northing)}`);
    return lines.join('\n');
  }

  // ── Prefix logic ──────────────────────────────────────────
  function onPrefixInput() {
    const val = document.getElementById('iName').value.trim();
    updatePrefixBar(val || prefix);
  }

  function updatePrefixBar(p) {
    const bar   = document.getElementById('prefixBar');
    const pdis  = document.getElementById('prefixDisplay');
    const ndis  = document.getElementById('nextNameDisplay');
    if (p) {
      bar.style.display = '';
      pdis.textContent  = p;
      ndis.textContent  = p + counter;
    } else {
      bar.style.display = 'none';
    }
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    const badge      = document.getElementById('countBadge');
    const tbody      = document.getElementById('tableBody');
    const empty      = document.getElementById('emptyState');
    const previewWrap= document.getElementById('previewWrap');

    badge.textContent = points.length;
    updatePrefixBar(prefix);

    if (points.length === 0) {
      tbody.innerHTML = ''; empty.style.display = ''; previewWrap.style.display = 'none'; return;
    }
    empty.style.display = 'none'; previewWrap.style.display = '';
    tbody.innerHTML = points.map((p,i) => `
      <tr>
        <td>${esc(p.name)}</td>
        <td>${fmt3(p.easting)}</td>
        <td>${fmt3(p.northing)}</td>
        <td><button class="del-btn" onclick="deletePoint(${i})">×</button></td>
      </tr>`).join('');
    document.getElementById('csvPreview').textContent = buildCsv();
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Paste (Clipboard API) ─────────────────────────────────
  async function pasteInto(inputId, callback) {
    try {
      const text = await navigator.clipboard.readText();
      const el   = document.getElementById(inputId);
      el.value   = text.trim();
      if (callback) callback();
      showToast('Eingefügt ✓');
    } catch(e) {
      showToast('Clipboard-Zugriff verweigert – bitte HTTPS verwenden', true);
    }
  }

  // ── Add point ─────────────────────────────────────────────
  function addPoint() {
    const nameInput = document.getElementById('iName').value.trim();
    const east      = document.getElementById('iEast').value.trim().replace(',','.');
    const north     = document.getElementById('iNorth').value.trim().replace(',','.');

    // Update prefix if user typed something new; reset counter if prefix changed
    if (nameInput && nameInput !== prefix) {
      prefix = nameInput;
      counter = 1;
    }

    if (!prefix)        { showToast('Bitte zuerst einen Namen / Präfix eingeben', true); return; }
    if (!east || !north){ showToast('Easting und Northing sind Pflicht', true); return; }
    if (isNaN(parseFloat(east)) || isNaN(parseFloat(north))) { showToast('Ungültige Koordinaten', true); return; }

    // First-ever prefix becomes the CSV filename
    if (!csvName) csvName = prefix;

    const pointName = prefix + counter;
    counter++;

    points.push({ name: pointName, easting: parseFloat(east), northing: parseFloat(north) });
    save();
    render();

    // Clear only coordinate fields; keep prefix field empty (prefix persists internally)
    document.getElementById('iName').value  = '';
    document.getElementById('iEast').value  = '';
    document.getElementById('iNorth').value = '';

    showToast(`${pointName} hinzugefügt ✓`);
  }

  function deletePoint(i) { points.splice(i,1); save(); render(); showToast('Gelöscht'); }

  function clearAll() {
    if (!points.length) return;
    if (confirm(`Alle ${points.length} Punkte und Zähler zurücksetzen?`)) {
      points=[]; counter=1; prefix=''; csvName='';
      document.getElementById('iName').value='';
      document.getElementById('iEast').value='';
      document.getElementById('iNorth').value='';
      save(); render();
      showToast('Liste geleert');
    }
  }

  function exportCsv() {
    if (!points.length) { showToast('Keine Punkte vorhanden', true); return; }
    const blob = new Blob([buildCsv()], {type:'text/csv;charset=utf-8;'});
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = (csvName || 'koordinaten') + '.csv';
    a.click();
    showToast('CSV exportiert ✓');
  }

  // ── Toast ─────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? 'var(--danger)' : 'var(--accent)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  load(); render();
</script>
</body>
</html>
